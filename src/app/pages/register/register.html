<div class="auth-page">
  <div class="auth-card">

    <div class="logo-container">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
      <h1 class="logo-text">My<span class="highlight">Finance</span></h1>
    </div>

    <h2 class="auth-title">สมัครสมาชิก</h2>
    <p class="auth-subtitle">สร้างบัญชีใหม่เพื่อเริ่มต้นจัดการการเงินของคุณ</p>

    <form (ngSubmit)="register()" #form="ngForm" class="auth-form">

      <div class="input-group">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <input type="text" placeholder="Username" [(ngModel)]="username" name="username" required class="auth-input" />
      </div>

      <div class="input-group">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required class="auth-input" />
      </div>

      <div *ngIf="error" class="error-message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ error }}</span>
      </div>

      <div *ngIf="success" class="success-message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>ลงทะเบียนสำเร็จ! กำลังพากลับหน้าเข้าสู่ระบบ...</span>
      </div>

      <button type="submit" [disabled]="loading || form.invalid || success" class="auth-button">
        <ng-container *ngIf="!loading">ลงทะเบียน</ng-container>
        <ng-container *ngIf="loading">
          <div class="spinner"></div>
          กำลังประมวลผล...
        </ng-container>
      </button>

      <div class="login-hint">
        มีบัญชีอยู่แล้ว? <a (click)="goToLogin()" class="login-link">เข้าสู่ระบบที่นี่</a>
      </div>

    </form>
  </div>
</div>
