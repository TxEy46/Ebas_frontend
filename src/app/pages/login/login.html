<div class="login-page">
  <div class="login-card">

    <div class="logo-container">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
      <h1 class="logo-text">My<span class="highlight">Finance</span></h1>
    </div>

    <h2 class="login-title">Welcome Back</h2>
    <p class="login-subtitle">Please enter your details to sign in.</p>

    <form (ngSubmit)="login()" #form="ngForm" class="login-form">

      <div class="input-group">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <input type="text" placeholder="Username" [(ngModel)]="username" name="username" required class="login-input" />
      </div>

      <div class="input-group">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required
          class="login-input" />
      </div>

      <div *ngIf="error" class="error-message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ error }}</span>
      </div>

      <button type="submit" [disabled]="loading || form.invalid" class="login-button">
        <ng-container *ngIf="!loading">เข้าสู่ระบบ</ng-container>
        <ng-container *ngIf="loading">
          <div class="spinner"></div>
          กำลังเข้าสู่ระบบ...
        </ng-container>
      </button>
      <div class="register-hint">
        ยังไม่มีบัญชี? <a (click)="goToRegister()" class="register-link">สมัครสมาชิก</a>
      </div>
    </form>
  </div>
</div>
