<div class="auth-page">
  <div class="auth-card">

    <div class="logo-container">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
        <line x1="12" y1="3" x2="12" y2="21"></line>
        <path d="M7 5h7a3.5 3.5 0 0 1 0 7H7m0 0h8a3.5 3.5 0 0 1 0 7H7V5z"></path>
      </svg>
      <h1 class="logo-text">My<span class="highlight">Finance</span></h1>
    </div>

    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">เข้าสู่ระบบเพื่อจัดการธุรกรรมของคุณ</p>

    <form (ngSubmit)="login()" #form="ngForm" class="auth-form">

      <div class="input-group">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <input type="text" placeholder="Username" [(ngModel)]="username" name="username" required class="auth-input"
          (input)="error = ''" autocomplete="username" />
      </div>

      <div class="input-group">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required class="auth-input"
          (input)="error = ''" autocomplete="current-password" />
      </div>

      <div *ngIf="error" class="error-message shake-animation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ error }}</span>
      </div>

      <button type="submit" [disabled]="loading || form.invalid" class="auth-button">
        <span *ngIf="!loading">เข้าสู่ระบบ</span>
        <div *ngIf="loading" class="spinner-container">
          <div class="spinner"></div>
          <span>กำลังตรวจสอบ...</span>
        </div>
      </button>

      <div class="login-hint">
        ยังไม่มีบัญชี? <a (click)="goToRegister()" class="login-link">สมัครสมาชิก</a>
      </div>
    </form>
  </div>
</div>
