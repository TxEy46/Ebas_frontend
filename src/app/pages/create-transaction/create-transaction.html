<div class="app-fullscreen">

  <app-sidebar></app-sidebar>

  <main class="main">
    <div class="form-wrapper">
      <h1>Create Transaction</h1>

      <div class="type-toggle">
        <button type="button" 
                (click)="setType('income')" 
                [ngClass]="type === 'income' ? 'active income' : ''">
          Income
        </button>
        <button type="button" 
                (click)="setType('expense')" 
                [ngClass]="type === 'expense' ? 'active expense' : ''">
          Expense
        </button>
      </div>

      <div [ngClass]="type === 'income' ? 'badge income' : 'badge expense'">
        <span></span>
        {{ type === 'income' ? 'บันทึกเป็นรายรับ — ยอดจะถูกบวก (+) เข้าบัญชี' 
                             : 'บันทึกเป็นรายจ่าย — ยอดจะถูกหัก (−) ออกจากบัญชี' }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="input-group">
          <label>Amount</label>
          <input type="number" 
                 step="0.01" 
                 min="0" 
                 formControlName="amount" 
                 [ngClass]="type === 'income' ? 'income-input' : 'expense-input'" 
                 placeholder="0.00">
        </div>

        <div class="input-group">
          <label>Category</label>
          <input type="text" 
                 formControlName="category" 
                 [ngClass]="type === 'income' ? 'income-input' : 'expense-input'" 
                 placeholder="e.g., Food, Salary">
        </div>

        <div class="input-group">
          <label>Name</label>
          <input type="text" 
                 formControlName="name" 
                 [ngClass]="type === 'income' ? 'income-input' : 'expense-input'" 
                 placeholder="e.g., Lunch, Bonus">
        </div>

        <button type="submit" 
                class="btn-submit" 
                [ngClass]="type === 'income' ? 'btn-income' : 'btn-expense'">
          {{ type === 'income' ? '+ Save Income' : '− Save Expense' }}
        </button>
      </form>
    </div>
  </main>

</div>
