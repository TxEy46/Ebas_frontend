<div class="page-layout">

    <div class="layout">
        <app-sidebar class="sidebar"></app-sidebar>

        <div class="content">

            <div class="header-section">
                <h1>Transactions</h1>

                <div class="filter">
                    <label for="monthSelect">Filter by Month:</label>
                    <div class="select-wrapper">
                        <select id="monthSelect" [(ngModel)]="selectedMonth">
                            <option *ngFor="let month of months" [value]="month">{{ month }}</option>
                        </select>
                        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <ng-container *ngIf="transactions$ | async as transactions; else loading">
                    <table class="transactions-table" *ngIf="transactions.length > 0; else empty">
                        <thead>
                            <tr>
                                <th>Transaction Name</th>
                                <th>Category</th>
                                <th class="align-right">Amount</th>
                                <th class="align-right">Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let tx of transactions" [hidden]="!filterByMonth(tx)">
                                <td class="fw-500">{{ tx.name }}</td>
                                <td>
                                    <span class="category-badge">{{ tx.category }}</span>
                                </td>
                                <td class="align-right amount" [ngClass]="tx.type">
                                    {{ tx.type === 'income' ? '+' : '-' }}${{ tx.amount | number:'1.2-2' }}
                                </td>
                                <td class="align-right date-col">{{ tx.createdate | date:'MMM d, yyyy, HH:mm' }}</td>
                            </tr>
                        </tbody>
                    </table>
                </ng-container>

                <ng-template #loading>
                    <div class="state-message loading">
                        <div class="spinner"></div>
                        Loading your transactions...
                    </div>
                </ng-template>

                <ng-template #empty>
                    <div class="state-message empty">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                            <line x1="16" x2="16" y1="2" y2="6" />
                            <line x1="8" x2="8" y1="2" y2="6" />
                            <line x1="3" x2="21" y1="10" y2="10" />
                            <path d="m9 16 2 2 4-4" />
                        </svg>
                        <p>No transactions found for this month.</p>
                    </div>
                </ng-template>
            </div>

        </div>
    </div>
</div>
