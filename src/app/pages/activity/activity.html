<div class="activity-page">

  <div class="header">
    <h1>Activity</h1>
    <button class="add-btn">+ Add</button>
  </div>

  <div class="card">

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Date</th>
          <th>Category</th>
          <th class="right">Amount</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngIf="transactions.length === 0">
          <td colspan="4" class="empty">
            No transactions found
          </td>
        </tr>

        <tr *ngFor="let t of transactions">
          <td class="name">{{ t.name }}</td>

          <td class="date">
            {{ t.date | date:'dd MMM yyyy' }}
          </td>

          <td class="category">{{ t.category }}</td>

          <td class="amount right"
              [ngClass]="{
                'income': t.amount > 0,
                'expense': t.amount < 0
              }">

            {{ t.amount > 0 ? '+' : '' }}{{ t.amount }} THB
          </td>
        </tr>

      </tbody>
    </table>

  </div>

</div>
